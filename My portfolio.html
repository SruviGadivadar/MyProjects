<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio</title>
  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: sans-serif;
}

body {
  background: lightcoral;
  color: white;
}

/* Navbar */
header {
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  background: rebeccapurple;
  position: sticky;
  top: 0;
}

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
}

#menu {
  display: none;
  font-size: 24px;
  cursor: pointer;
}

/* Sections */
.section {
  padding: 80px 20px;
  text-align: center;
}

/* Button */
button {
  margin-top: 10px;
  padding: 10px 20px;
  background: #38bdf8;
  border: none;
  color: black;
  cursor: pointer;
  border-radius: 5px;
}

button:hover {
  background: #0ea5e9;
}

/* Projects */
.project-container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.card {
  background: gray;
  padding: 20px;
  margin: 10px;
  border-radius: 10px;
  width: 200px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

/* Responsive */
@media (max-width: 768px) {
  nav {
    display: none;
    flex-direction: column;
    background: lightblue;
    position: absolute;
    top: 60px;
    right: 0;
    width: 200px;
  }

  nav.active {
    display: flex;
  }

  #menu {
    display: block;
  }
}
  </style>
</head>
<body>

<header>
  <h2 class="logo">Srushti</h2>
  <nav id="nav">
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
  <div id="menu">☰</div>
</header>

<section id="home" class="section">
  <h1>Hello, I'm Srushti 👋</h1>
  <p>Frontend Developer</p>
  <button>Hire Me</button>
</section>

<section id="about" class="section">
  <h2>About Me</h2>
  <p>I create responsive and user-friendly websites using HTML, CSS, JavaScript.</p>
</section>

<section id="projects" class="section">
  <h2>Projects</h2>

  <div class="project-container">
    <div class="card">
      <h3>Weather App</h3>
      <p>Using API</p>
    </div>

    <div class="card">
      <h3>Portfolio</h3>
      <p>Responsive Design</p>
    </div>
  </div>
</section>

<section id="contact" class="section">
  <h2>Contact</h2>
  <p>Email: yourmail@gmail.com</p>
</section>

<script>
    // Mobile Menu
const menu = document.getElementById("menu");
const nav = document.getElementById("nav");

menu.onclick = () => {
  nav.classList.toggle("active");
};

// Smooth Scroll
document.querySelectorAll("nav a").forEach(link => {
  link.onclick = function(e) {
    e.preventDefault();
    document.querySelector(this.getAttribute("href"))
      .scrollIntoView({ behavior: "smooth" });
  };
});
</script>
</body>
</html>
